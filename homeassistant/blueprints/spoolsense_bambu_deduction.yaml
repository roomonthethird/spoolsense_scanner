blueprint:
  name: "SpoolSense → Spoolman Deduction"
  description: >
    Automatically deduct filament weight from Spoolman after a Bambu Lab print
    completes or is canceled. Requires the SpoolSense → Bambu AMS blueprint
    (which stores spool UIDs per tray) and the spoolman-homeassistant integration.
  domain: automation
  input:
    bambu_device:
      name: Bambu Printer
      description: Your Bambu Lab printer device
      selector:
        device:
          integration: bambu_lab
    print_weight_sensor:
      name: Print Weight Sensor
      description: >
        The Bambu print weight sensor (e.g., sensor.p1s_print_weight).
        Its attributes contain per-tray weight breakdown after a print.
      selector:
        entity:
          filter:
            - domain: sensor
    ams_tray_entities:
      name: AMS Tray Sensors
      description: >
        Select the same AMS tray sensors as in the SpoolSense → Bambu AMS blueprint.
        Must have matching input_text helpers created (see documentation).
      selector:
        entity:
          multiple: true
          filter:
            - domain: sensor

mode: single
max_exceeded: silent

triggers:
  - trigger: device
    device_id: !input bambu_device
    domain: bambu_lab
    type: event_print_finished
  - trigger: device
    device_id: !input bambu_device
    domain: bambu_lab
    type: event_print_canceled

actions:
  - delay:
      seconds: 5

  - variables:
      weight_sensor: !input print_weight_sensor
      tray_entities: !input ams_tray_entities
      # Per-tray weights are attributes on the print_weight sensor (e.g., "AMS 1 Tray 1": 12.5)

  - repeat:
      for_each: "{{ tray_entities }}"
      sequence:
        - variables:
            tray_entity: "{{ repeat.item }}"
            tray_name_key: >
              {% set parts = tray_entity.replace('sensor.', '').split('_ams_') %}
              {% if parts | length == 2 %}
                {% set ams_tray = parts[1].replace('tray_', '').split('_') %}
                {% if ams_tray | length >= 1 %}
                  AMS {{ ams_tray[0] | default(1) }} Tray {{ ams_tray[-1] | default(1) }}
                {% endif %}
              {% endif %}
            tray_weight_used: "{{ state_attr(weight_sensor, tray_name_key | trim) | float(0) }}"
            helper_uid: "input_text.spoolsense_{{ tray_entity | replace('sensor.', '') }}_uid"
            helper_spoolman_id: "input_text.spoolsense_{{ tray_entity | replace('sensor.', '') }}_spoolman_id"
            stored_uid: "{{ states(helper_uid) | default('') }}"
            stored_spoolman_id: "{{ states(helper_spoolman_id) | default('-1') }}"

        - condition: template
          value_template: "{{ tray_weight_used | float(0) > 0 }}"

        - condition: template
          value_template: "{{ stored_uid != '' and stored_uid != 'unknown' }}"

        - variables:
            spoolman_id: >
              {% if stored_spoolman_id | int(-1) > 0 %}
                {{ stored_spoolman_id }}
              {% else %}
                {% set ns = namespace(found='') %}
                {% for entity in integration_entities('spoolman') %}
                  {% if state_attr(entity, 'extra_nfc_id') == stored_uid and ns.found == '' %}
                    {% set ns.found = state_attr(entity, 'id') | string %}
                  {% endif %}
                {% endfor %}
                {{ ns.found }}
              {% endif %}

        - condition: template
          value_template: "{{ spoolman_id | trim | int(-1) > 0 }}"

        - action: spoolman.use_spool_filament
          data:
            id: "{{ spoolman_id | trim }}"
            use_weight: "{{ tray_weight_used | float }}"
